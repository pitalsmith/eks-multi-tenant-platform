apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-mesh-controller
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/pitalsmith/eks-multi-tenant-platform.git'
    targetRevision: HEAD
    path: argocd-master
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

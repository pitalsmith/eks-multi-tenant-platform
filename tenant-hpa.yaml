apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tenant-alpha-backend-hpa
  namespace: tenant-alpha
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-api
  minReplicas: 2
  maxReplicas: 3  # Lowered from 6 to protect your t3.small memory pool
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70  # Raised from 50% to prevent overly aggressive scaling

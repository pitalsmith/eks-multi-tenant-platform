apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-backend-deployment
  namespace: apps
  labels:
    app: my-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-backend
  template:
    metadata:
      labels:
        app: my-backend
    spec:
      containers:
        - name: app-container
          image: 763054201983.dkr.ecr.us-east-1.amazonaws.com/backend-api:v2
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: my-backend-service
  namespace: apps
spec:
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  selector:
    app: my-backend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-backend-ingress
  namespace: apps
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:  # <--- Removed strict 'host' filter to allow direct IP and multi-domain browser access!
        paths:
          - path: "/api(/|$)(.*)"
            pathType: ImplementationSpecific
            backend:
              service:
                name: my-backend-service
                port:
                  number: 80

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: tenant-alpha
  name: tenant-alpha-admin
rules:
- apiGroups: ["", "apps", "batch", "extensions"]
  resources: ["pods", "services", "deployments", "replicasets", "statefulsets", "cronjobs", "jobs", "configmaps", "secrets", "persistentvolumeclaims"]
  verbs: ["*"] # Full control inside this namespace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bind-tenant-alpha-admin
  namespace: tenant-alpha
subjects:
- kind: User
  name: team-alpha-user # We will map this to an AWS IAM identity next
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: tenant-alpha-admin
  apiGroup: rbac.authorization.k8s.io
